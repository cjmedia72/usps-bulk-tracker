<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f8f9fa;
    }
    .header {
      background: linear-gradient(135deg, #1a237e, #283593);
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      background: white;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Consolas', 'Monaco', monospace;
      resize: vertical;
    }
    textarea:focus { border-color: #1a73e8; outline: none; }
    .hint { font-size: 10px; color: #888; margin-top: 4px; }

    .progress-bar {
      height: 3px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%;
      background: #1a73e8;
      width: 0%;
      transition: width 0.3s;
    }

    .actions { display: flex; gap: 8px; padding: 12px 16px; }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1557b0; }
    .btn-secondary { background: #e8eaed; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #d2d5d9; }

    #status {
      font-size: 11px;
      color: #666;
      padding: 0 16px 8px;
      min-height: 16px;
    }
    #status.error { color: #d93025; }
    #status.success { color: #0d652d; }

    .results-section { display: none; }
    .results-section.show { display: block; }
    .results-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 8px 0;
    }
    .stat {
      text-align: center;
      padding: 8px 12px;
      background: #f1f3f4;
      border-radius: 8px;
    }
    .stat-seized { background: #fce8e6; }
    .stat-seized .stat-num { color: #d93025; }
    .stat-num { font-size: 20px; font-weight: 700; color: #1a73e8; }
    .stat-label { font-size: 10px; color: #666; }

    #resultsText {
      width: 100%;
      height: 80px;
      font-family: monospace;
      font-size: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px;
      margin-top: 8px;
    }

    .copy-row { display: flex; gap: 8px; margin-top: 8px; }
    .copy-row .btn { flex: 1; font-size: 11px; padding: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>USPS Bulk Tracker</h1>
    <p>Track up to 200+ packages at once. 17track replacement.</p>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="section-title" style="margin-bottom:0;">Tracking Numbers</div>
      <button id="btnClear" title="Clear all" style="background:none;border:none;cursor:pointer;font-size:18px;color:#ff0000;font-weight:bold;padding:2px 6px;border-radius:4px;line-height:1;">&#10005;</button>
    </div>
    <textarea id="trackingInput" placeholder="Paste tracking numbers here, one per line.

9401992652104550856063
9401992652104053947077
9401992652104003783496
..."></textarea>
    <div class="hint" id="tnCount">0 tracking numbers detected</div>
  </div>

  <div id="status"></div>

  <div class="actions">
    <button class="btn btn-primary" id="btnTrack">Track All</button>
    <button class="btn btn-secondary" id="btnPaste">Select All (then Ctrl+V)</button>
  </div>

  <div class="section results-section" id="resultsSection">
    <div class="section-title">Results</div>
    <div class="results-summary">
      <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="statTransit">0</div><div class="stat-label">In Transit</div></div>
      <div class="stat" id="statOFDBox" style="display:none;"><div class="stat-num" id="statOFD">0</div><div class="stat-label">Out for Delivery</div></div>
      <div class="stat"><div class="stat-num" id="statDelivered">0</div><div class="stat-label">Delivered</div></div>
      <div class="stat"><div class="stat-num" id="statNotFound">0</div><div class="stat-label">Not Found</div></div>
      <div class="stat stat-seized" id="statSeizedBox" style="display:none;"><div class="stat-num" id="statSeized">0</div><div class="stat-label">Seized</div></div>
    </div>
    <textarea id="resultsText" readonly></textarea>
    <div class="copy-row">
      <button class="btn btn-primary" id="btnCopyTSV">Copy as TSV (for Sheets)</button>
      <button class="btn btn-secondary" id="btnCopyCSV">Copy as CSV</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
